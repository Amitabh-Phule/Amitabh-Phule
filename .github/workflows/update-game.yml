name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'  # दररोज रात्री १२ वाजता अपडेट होईल
  workflow_dispatch:      # तुला हवं तेव्हा मॅन्युअली रन करता येईल

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add game.gif
          git commit -m "Update space shooter game" || echo "No changes to commit"
          git push
